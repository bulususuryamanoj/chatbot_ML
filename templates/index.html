<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DS AI Assistant</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:#f5f5f5;
color:#222;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#ffffff;
height:100vh;
display:flex;
flex-direction:column;
padding:15px;
border-right:1px solid #ddd;
}

.sidebar h2{
font-size:18px;
margin-bottom:10px;
}

.sidebar button{
padding:10px;
margin-bottom:10px;
background:#2b7cff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
opacity:0.9;
}

.history{
flex:1;
overflow-y:auto;
}

/* history item */

.history-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
font-size:14px;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
background:#f0f0f0;
}

.history-item:hover{
background:#e2e2e2;
}

.delete-btn{
background:none;
border:none;
color:#888;
cursor:pointer;
font-size:14px;
}

.delete-btn:hover{
color:red;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */

.chat-container{
flex:1;
overflow-y:auto;
padding:30px;
max-width:900px;
margin:auto;
}

.message{
display:flex;
margin:15px 0;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
max-width:70%;
padding:14px 18px;
border-radius:18px;
white-space:pre-line;
line-height:1.5;
font-size:15px;
}

/* user bubble */

.user .bubble{
background:#2b7cff;
color:white;
border-bottom-right-radius:5px;
}

/* bot bubble */

.bot .bubble{
background:#e9e9e9;
border-bottom-left-radius:5px;
}

/* INPUT AREA */

.input-area{
padding:15px;
background:#ffffff;
border-top:1px solid #ddd;
}

.input-container{
display:flex;
align-items:center;
border-radius:30px;
padding:10px 15px;
background:#f5f5f5;
border:1px solid #ddd;
}

input{
flex:1;
background:transparent;
border:none;
outline:none;
font-size:16px;
}

button.icon{
background:none;
border:none;
font-size:20px;
cursor:pointer;
margin-left:10px;
}

button.icon:hover{
opacity:0.7;
}

/* loader */

.loader{
border:3px solid #ddd;
border-top:3px solid #2b7cff;
border-radius:50%;
width:12px;
height:12px;
display:inline-block;
margin-right:6px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:6px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>DS AI Assistant</h2>

<button onclick="newChat()">➕ New Chat</button>

<div class="history" id="historyList"></div>

</div>

<!-- MAIN -->

<div class="main">

<div id="chat" class="chat-container"></div>

<div class="input-area">

<div class="input-container">

<input id="userInput"
placeholder="Ask anything about Data Science..."
onkeypress="handleKey(event)">

<button class="icon" onclick="startVoice()">🎤</button>
<button class="icon" onclick="sendMessage()">➤</button>

</div>

<div class="footer">
DS AI Assistant can make mistakes
</div>

</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("ds_chats")) || [];
let currentChatId = null;

/* SAVE */

function saveChats(){
localStorage.setItem("ds_chats",JSON.stringify(chats));
}

/* RENDER HISTORY */

function renderHistory(){

const historyDiv=document.getElementById("historyList");
historyDiv.innerHTML="";

chats.forEach(chat=>{

const item=document.createElement("div");
item.className="history-item";

const title=document.createElement("span");
title.innerText=chat.title;
title.onclick=()=>loadChat(chat.id);

const deleteBtn=document.createElement("button");
deleteBtn.className="delete-btn";
deleteBtn.innerText="🗑";
deleteBtn.onclick=(e)=>{
e.stopPropagation();
deleteChat(chat.id);
};

item.appendChild(title);
item.appendChild(deleteBtn);

historyDiv.appendChild(item);

});

}

/* DELETE CHAT */

function deleteChat(id){

chats=chats.filter(c=>c.id!==id);

saveChats();
renderHistory();

document.getElementById("chat").innerHTML="";

}

/* LOAD CHAT */

function loadChat(id){

const chat=chats.find(c=>c.id===id);

if(!chat)return;

currentChatId=id;

document.getElementById("chat").innerHTML="";

chat.messages.forEach(msg=>{
addMessage(msg.role,msg.text);
});

}

/* NEW CHAT */

function newChat(){

currentChatId=Date.now();

chats.push({
id:currentChatId,
title:"New Chat",
messages:[]
});

saveChats();
renderHistory();

document.getElementById("chat").innerHTML="";

}

/* ADD MESSAGE */

function addMessage(role,text,isLoading=false){

const chatDiv=document.getElementById("chat");

const messageDiv=document.createElement("div");
messageDiv.className="message "+role;

const bubble=document.createElement("div");
bubble.className="bubble";

if(isLoading){
bubble.innerHTML="<span class='loader'></span> Thinking...";
}else{
bubble.innerText=text;
}

messageDiv.appendChild(bubble);
chatDiv.appendChild(messageDiv);

chatDiv.scrollTop=chatDiv.scrollHeight;

return bubble;

}

/* SEND MESSAGE */

function sendMessage(){

const input=document.getElementById("userInput");
const message=input.value.trim();

if(!message)return;

if(!currentChatId)newChat();

addMessage("user",message);

chats.find(c=>c.id===currentChatId).messages.push({
role:"user",
text:message
});

input.value="";

const loadingBubble=addMessage("bot","",true);

fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{

loadingBubble.innerText=data.response;

chats.find(c=>c.id===currentChatId).messages.push({
role:"bot",
text:data.response
});

if(chats.find(c=>c.id===currentChatId).title==="New Chat"){
chats.find(c=>c.id===currentChatId).title=message.substring(0,25);
}

saveChats();
renderHistory();

});

}

/* ENTER KEY */

function handleKey(e){

if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();
sendMessage();
}

}

/* VOICE */

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported");
return;
}

const recognition=new SpeechRecognition();

recognition.start();

recognition.onresult=(event)=>{

document.getElementById("userInput").value=
event.results[0][0].transcript;

};

}

/* INIT */

renderHistory();

</script>

</body>
</html>
