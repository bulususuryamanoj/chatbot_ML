<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DS AI Assistant</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background-color: #202123;
    color: white;
    display: flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 260px;
    background-color: #111;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 15px;
}

.sidebar h2 {
    font-size: 18px;
    margin-bottom: 10px;
}

.sidebar button {
    padding: 10px;
    margin-bottom: 10px;
    background-color: #10a37f;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.sidebar button:hover {
    opacity: 0.9;
}

.history {
    flex: 1;
    overflow-y: auto;
}

.history-item {
    padding: 8px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 5px;
    background-color: #1f1f1f;
}

.history-item:hover {
    background-color: #333;
}

/* ================= MAIN ================= */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

.message {
    display: flex;
    margin: 15px 0;
}

.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

.bubble {
    max-width: 70%;
    padding: 14px 18px;
    border-radius: 18px;
    white-space: pre-line;
    line-height: 1.5;
    font-size: 15px;
}

.user .bubble {
    background-color: #10a37f;
    border-bottom-right-radius: 5px;
}

.bot .bubble {
    background-color: #444654;
    border-bottom-left-radius: 5px;
}

/* ================= INPUT ================= */
.input-area {
    padding: 15px;
    background-color: #40414f;
}

.input-container {
    display: flex;
    align-items: center;
    border-radius: 30px;
    padding: 10px 15px;
    background-color: #40414f;
    border: 1px solid #555;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 16px;
}

button.icon {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    margin-left: 10px;
}

.loader {
    border: 3px solid #666;
    border-top: 3px solid #10a37f;
    border-radius: 50%;
    width: 12px;
    height: 12px;
    display: inline-block;
    margin-right: 6px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>DS AI Assistant</h2>
    <button onclick="newChat()">➕ New Chat</button>
    <div class="history" id="historyList"></div>
</div>

<!-- MAIN -->
<div class="main">

    <div id="chat" class="chat-container"></div>

    <div class="input-area">
        <div class="input-container">
            <input id="userInput"
                   placeholder="Ask anything about Data Science..."
                   onkeypress="handleKey(event)">
            <button class="icon" onclick="startVoice()">🎤</button>
            <button class="icon" onclick="sendMessage()">➤</button>
        </div>
        <div class="footer">
            DS AI Assistant can make mistakes
        </div>
    </div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("ds_chats")) || [];
let currentChatId = null;

/* ================= SAVE ================= */
function saveChats() {
    localStorage.setItem("ds_chats", JSON.stringify(chats));
}

/* ================= RENDER HISTORY ================= */
function renderHistory() {
    const historyDiv = document.getElementById("historyList");
    historyDiv.innerHTML = "";

    chats.forEach(chat => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerText = chat.title;
        item.onclick = () => loadChat(chat.id);
        historyDiv.appendChild(item);
    });
}

/* ================= LOAD CHAT ================= */
function loadChat(id) {
    const chat = chats.find(c => c.id === id);
    if (!chat) return;

    currentChatId = id;
    document.getElementById("chat").innerHTML = "";

    chat.messages.forEach(msg => {
        addMessage(msg.role, msg.text);
    });
}

/* ================= NEW CHAT ================= */
function newChat() {
    currentChatId = Date.now();
    chats.push({
        id: currentChatId,
        title: "New Chat",
        messages: []
    });
    saveChats();
    renderHistory();
    document.getElementById("chat").innerHTML = "";
}

/* ================= ADD MESSAGE ================= */
function addMessage(role, text, isLoading = false) {

    const chatDiv = document.getElementById("chat");

    const messageDiv = document.createElement("div");
    messageDiv.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (isLoading) {
        bubble.innerHTML = "<span class='loader'></span> Thinking...";
    } else {
        bubble.innerText = text;
    }

    messageDiv.appendChild(bubble);
    chatDiv.appendChild(messageDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    return bubble;
}

/* ================= SEND ================= */
function sendMessage() {

    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    if (!currentChatId) newChat();

    addMessage("user", message);
    chats.find(c => c.id === currentChatId).messages.push({
        role: "user",
        text: message
    });

    input.value = "";

    const loadingBubble = addMessage("bot", "", true);

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        loadingBubble.innerText = data.response;

        chats.find(c => c.id === currentChatId).messages.push({
            role: "bot",
            text: data.response
        });

        if (chats.find(c => c.id === currentChatId).title === "New Chat") {
            chats.find(c => c.id === currentChatId).title = message.substring(0, 25);
        }

        saveChats();
        renderHistory();
    });
}

/* ================= ENTER ================= */
function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

/* ================= VOICE ================= */
function startVoice() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Voice not supported");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.start();

    recognition.onresult = (event) => {
        document.getElementById("userInput").value =
            event.results[0][0].transcript;
    };
}

/* INIT */
renderHistory();

</script>

</body>
</html>
